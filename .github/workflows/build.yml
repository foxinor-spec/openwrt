name: build-openwrt

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
- name: checkout
  uses: actions/checkout@v4

- name: install deps
  run: |
    sudo apt update
    sudo apt install -y build-essential clang flex bison g++ gawk \
    gcc-multilib g++-multilib gettext git libncurses-dev \
    libssl-dev python3 rsync unzip zlib1g-dev file wget

- name: clone openwrt
  run: |
    git clone https://github.com/openwrt/openwrt
    cd openwrt
    ./scripts/feeds update -a
    ./scripts/feeds install -a

- name: configure
  run: |
    cd openwrt
    echo "CONFIG_TARGET_ramips=y" >> .config
    echo "CONFIG_TARGET_ramips_mt76x8=y" >> .config
    echo "CONFIG_TARGET_ramips_mt76x8_DEVICE_xiaomi_mi-router-4a-100m=y" >> .config

- name: build
  run: |
    cd openwrt
    make -j$(nproc)

- name: upload
  uses: actions/upload-artifact@v4
  with:
    name: firmware
    path: openwrt/bin/targets/
```
